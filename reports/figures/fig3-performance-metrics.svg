<svg xmlns="http://www.w3.org/2000/svg" width="1979" height="980" viewBox="0 0 1979 980">
  <rect width="1979" height="980" fill="#ffffff"/>
  <text x="110" y="104" font-family="DejaVu Sans, Arial, sans-serif" font-size="56" font-weight="700" fill="#0f172a">RAG Capability Test on a Full-Novel Index</text>
  <text x="110" y="158" font-family="DejaVu Sans, Arial, sans-serif" font-size="29" fill="#475569">42-question diagnostic; main Socartes condition uses hybrid RRF reranking and a direct-support gate over 1047 chunks.</text>

  <g font-family="DejaVu Sans, Arial, sans-serif">
    <rect x="110" y="230" width="1759" height="82" rx="8" fill="#0f172a"/>
    <text x="150" y="282" font-size="28" font-weight="700" fill="#ffffff">Condition</text>
    <text x="760" y="282" font-size="28" font-weight="700" fill="#ffffff">Answerable</text>
    <text x="1115" y="282" font-size="28" font-weight="700" fill="#ffffff">Refusal Q11-Q12</text>
    <text x="1455" y="282" font-size="28" font-weight="700" fill="#ffffff">Role in paper</text>

    <g transform="translate(110 350)">
      <rect x="0" y="0" width="1759" height="132" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
      <text x="40" y="48" font-size="27" font-weight="700" fill="#0f172a">GPT-5.5 closed-book probe</text>
      <text x="40" y="86" font-size="23" fill="#64748b">No search, no database access</text>
      <text x="680" y="72" font-size="44" font-weight="700" fill="#b45309">2/10</text>
      <text x="1030" y="72" font-size="44" font-weight="700" fill="#b45309">1/2</text>
      <text x="1345" y="58" font-size="23" fill="#334155">Reference only:</text>
      <text x="1345" y="92" font-size="23" fill="#334155">model memory is unreliable</text>
    </g>

    <g transform="translate(110 518)">
      <rect x="0" y="0" width="1759" height="132" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
      <text x="40" y="48" font-size="27" font-weight="700" fill="#0f172a">Baseline: legacy top-1 lexical retrieval</text>
      <text x="40" y="86" font-size="23" fill="#64748b">Single highest lexical-overlap chunk</text>
      <text x="680" y="72" font-size="44" font-weight="700" fill="#b45309">22/40</text>
      <text x="1030" y="72" font-size="44" font-weight="700" fill="#b45309">1/2</text>
      <text x="1345" y="58" font-size="23" fill="#334155">Before repair:</text>
      <text x="1345" y="92" font-size="23" fill="#334155">missed Q2, Q5, Q10</text>
    </g>

    <g transform="translate(110 686)">
      <rect x="0" y="0" width="1759" height="150" rx="8" fill="#ecfdf5" stroke="#22c55e" stroke-width="3"/>
      <text x="40" y="50" font-size="28" font-weight="700" fill="#064e3b">Socartes full-novel automatic index</text>
      <text x="40" y="90" font-size="23" fill="#166534">1047 deterministic automatic chunks</text>
      <text x="680" y="82" font-size="52" font-weight="700" fill="#15803d">39/40</text>
      <text x="1030" y="82" font-size="52" font-weight="700" fill="#15803d">2/2</text>
      <text x="1345" y="62" font-size="24" font-weight="700" fill="#064e3b">Main RAG test</text>
      <text x="1345" y="100" font-size="23" fill="#166534">Full-novel retrieval + refusal behavior</text>
    </g>
  </g>

  <rect x="110" y="880" width="1759" height="72" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text x="145" y="925" font-family="DejaVu Sans, Arial, sans-serif" font-size="25" fill="#166534">Conclusion: after removing answer-key synonyms, RRF reranking reaches 39/40 and 2/2 refusals.</text>
</svg>
